<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hoops Run</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { position: absolute; top: 0; left: 0; display: block; touch-action: none; user-select: none; -webkit-user-select: none; }
  #hud {
    position: absolute; top: 0; left: 0; width: 100%; padding: 10px 16px;
    display: flex; justify-content: space-between; pointer-events: none; z-index: 5;
  }
  .hud-box {
    background: rgba(0,0,0,0.45); color: #fff; padding: 6px 14px;
    border-radius: 10px; font-size: 15px; font-weight: 600;
    backdrop-filter: blur(4px);
  }
  .hud-box .label { color: #f8a000; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; display: flex; align-items: center; justify-content: center; z-index: 10;
  }
  #popup {
    display: none; pointer-events: auto; text-align: center;
    background: rgba(10,30,50,0.93); padding: 32px 48px; border-radius: 22px;
    border: 3px solid #f8a000; box-shadow: 0 0 50px rgba(248,160,0,0.25);
    backdrop-filter: blur(8px); max-width: 88vw;
  }
  .pop-title { font-size: 38px; font-weight: 800; color: #f8a000; margin-bottom: 6px; }
  .pop-sub { font-size: 17px; color: #ddd; margin-bottom: 4px; }
  .pop-stats { font-size: 14px; color: #aaa; margin: 10px 0; }
  .pop-btn {
    pointer-events: auto; font-family: inherit; font-size: 17px; font-weight: 700;
    padding: 12px 38px; border: none; background: linear-gradient(135deg, #f8a000, #e85d04);
    color: #fff; border-radius: 50px; cursor: pointer; transition: all 0.15s;
    margin-top: 12px; text-transform: uppercase; letter-spacing: 1px;
  }
  .pop-btn:hover { transform: scale(1.05); }
  #callout {
    position: absolute; top: 32%; left: 50%; transform: translate(-50%,-50%);
    font-size: 42px; font-weight: 900; color: #fff; pointer-events: none;
    text-shadow: 0 0 25px rgba(248,160,0,0.8), 2px 2px 0 rgba(0,0,0,0.5);
    opacity: 0; transition: opacity 0.25s; z-index: 15;
  }
  #hint {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    color: #fff; font-size: 14px; pointer-events: none; z-index: 5;
    background: rgba(0,0,0,0.4); padding: 5px 14px; border-radius: 8px;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="hud-box"><span class="label">Court</span><br><span id="hud-court">1/4</span></div>
  <div class="hud-box"><span class="label">Made</span><br><span id="hud-shots">0/30</span></div>
  <div class="hud-box"><span class="label">Total</span><br><span id="hud-total">0</span></div>
</div>
<div id="overlay"><div id="popup"></div></div>
<div id="callout"></div>
<div id="hint"></div>

<script>
// ======== SETUP ========
const C = document.getElementById('c');
const X = C.getContext('2d');
const popup = document.getElementById('popup');
const calloutEl = document.getElementById('callout');
const hintEl = document.getElementById('hint');

let W, H;
function resize() {
  W = window.innerWidth; H = window.innerHeight;
  C.width = W; C.height = H;
}
window.addEventListener('resize', resize);
resize();

// ======== CONFIG ========
const COURTS = 4;
const NEEDED = 30;
const courtNames = ['Neighborhood Court','Park Court','School Court','Downtown Court'];

// ======== GAME STATE ========
let state = 'title';
let court = 0, made = 0, totalMade = 0;

// Ball
let ball = { active:false, x:0, y:0, tx:0, ty:0, t:0, dur:35, scored:false };

// Fling
let fling = { down:false, sx:0, sy:0, cx:0, cy:0 };

// Transition
let trans = { alpha:0, dir:0, cb:null };

// Run home
let runT = 0;

// Particles
let parts = [];

// Clouds
let clouds = [];
for (let i = 0; i < 5; i++) clouds.push({
  x: Math.random()*2000-400, y: 20+Math.random()*80, w: 80+Math.random()*100, sp: 0.2+Math.random()*0.2
});

// ======== VOICE ========
const phrases = ['Good job!','Alright!','Good man!'];
let maleVoice = null;
function pickVoice() {
  const vs = speechSynthesis.getVoices();
  const keys = ['david','male','james','mark','daniel'];
  for (const v of vs) { const n=v.name.toLowerCase(); for (const k of keys) if(n.includes(k)) return v; }
  for (const v of vs) if (v.lang.startsWith('en')) return v;
  return vs[0]||null;
}
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = ()=>{ maleVoice=pickVoice(); };
  maleVoice = pickVoice();
}
function say(text) {
  if ('speechSynthesis' in window) {
    const u = new SpeechSynthesisUtterance(text);
    u.pitch = 0.75; u.rate = 1.0;
    if (maleVoice) u.voice = maleVoice;
    speechSynthesis.speak(u);
  }
  calloutEl.textContent = text;
  calloutEl.style.opacity = '1';
  setTimeout(()=>{ calloutEl.style.opacity='0'; }, 1100);
}

// ======== LAYOUT ========
function HZ() { return H*0.33; }
function CT() { return H*0.38; }
function CB() { return H*0.95; }
function RCX() { return W/2; }
function RCY() { return H*0.24; }
function RW() { return Math.max(W*0.08, 50); }

// ======== DRAWING ========
function drawSky() {
  const g = X.createLinearGradient(0,0,0,HZ());
  g.addColorStop(0,'#3a8ed8'); g.addColorStop(1,'#8ecae6');
  X.fillStyle=g; X.fillRect(0,0,W,HZ()+2);

  // Sun
  const sx=W*0.8, sy=H*0.08;
  const sg=X.createRadialGradient(sx,sy,4,sx,sy,55);
  sg.addColorStop(0,'rgba(255,255,220,1)'); sg.addColorStop(0.35,'rgba(255,240,100,0.7)'); sg.addColorStop(1,'rgba(255,200,50,0)');
  X.fillStyle=sg; X.beginPath(); X.arc(sx,sy,55,0,Math.PI*2); X.fill();
  X.fillStyle='#fffde0'; X.beginPath(); X.arc(sx,sy,16,0,Math.PI*2); X.fill();

  // Clouds
  X.fillStyle='rgba(255,255,255,0.8)';
  for (const c of clouds) {
    c.x+=c.sp; if(c.x>W+c.w) c.x=-c.w*1.5;
    X.beginPath(); X.ellipse(c.x,c.y,c.w*0.5,18,0,0,Math.PI*2); X.fill();
    X.beginPath(); X.ellipse(c.x-c.w*0.22,c.y+5,c.w*0.32,14,0,0,Math.PI*2); X.fill();
    X.beginPath(); X.ellipse(c.x+c.w*0.28,c.y+4,c.w*0.28,12,0,0,Math.PI*2); X.fill();
  }
}

function drawGround() {
  // Grass everywhere below horizon
  const g=X.createLinearGradient(0,HZ(),0,H);
  g.addColorStop(0,'#3a8425'); g.addColorStop(1,'#4a9a30');
  X.fillStyle=g; X.fillRect(0,HZ(),W,H-HZ());

  // Treeline
  X.fillStyle='#2d6e18';
  for (let x=0;x<W;x+=35) {
    const th=12+Math.sin(x*0.04)*8+Math.cos(x*0.09)*5;
    X.beginPath(); X.arc(x,HZ(),th,Math.PI,Math.PI*2); X.fill();
  }
}

function drawCourt() {
  const ct=CT(), cb=CB(), cx=W/2;
  const nw=W*0.32, ww=W*0.88;

  const g=X.createLinearGradient(0,ct,0,cb);
  g.addColorStop(0,'#a06020'); g.addColorStop(1,'#c48838');
  X.fillStyle=g;
  X.beginPath();
  X.moveTo(cx-nw/2,ct); X.lineTo(cx+nw/2,ct); X.lineTo(cx+ww/2,cb); X.lineTo(cx-ww/2,cb);
  X.closePath(); X.fill();

  // Lines
  X.strokeStyle='rgba(255,255,255,0.25)'; X.lineWidth=2; X.stroke();

  // Key
  const ktw=W*0.11, kbw=W*0.22;
  const kt=ct+(cb-ct)*0.04, kb=kt+(cb-ct)*0.5;
  X.beginPath();
  X.moveTo(cx-ktw/2,kt); X.lineTo(cx+ktw/2,kt); X.lineTo(cx+kbw/2,kb); X.lineTo(cx-kbw/2,kb);
  X.closePath(); X.stroke();
  X.beginPath(); X.moveTo(cx-kbw/2,kb); X.lineTo(cx+kbw/2,kb); X.stroke();
  X.beginPath(); X.ellipse(cx,kb,kbw/2,kbw*0.15,0,0,Math.PI); X.stroke();

  // 3pt
  const tnw=W*0.16, tww=W*0.48, tt=ct+(cb-ct)*0.02, tb=ct+(cb-ct)*0.65;
  X.beginPath(); X.moveTo(cx-tnw/2,tt); X.quadraticCurveTo(cx-tww/2,(tt+tb)/2,cx-tww/2,tb); X.stroke();
  X.beginPath(); X.moveTo(cx+tnw/2,tt); X.quadraticCurveTo(cx+tww/2,(tt+tb)/2,cx+tww/2,tb); X.stroke();

  X.globalAlpha=1;

  // Name
  X.fillStyle='rgba(255,255,255,0.07)';
  X.font=`bold ${Math.min(W*0.04,36)}px Arial`;
  X.textAlign='center';
  X.fillText(courtNames[court].toUpperCase(),cx,ct+(cb-ct)*0.78);
}

function drawHoop() {
  const cx=RCX(), ry=RCY(), rw=RW();

  // Pole
  X.fillStyle='#777'; X.fillRect(cx-3,ry,6,CT()-ry+10);

  // Backboard
  const bbw=rw*2.1, bbh=rw*1.3, bby=ry-bbh*0.45;
  X.fillStyle='rgba(210,225,240,0.4)'; X.fillRect(cx-bbw/2,bby,bbw,bbh);
  X.strokeStyle='#999'; X.lineWidth=2.5; X.strokeRect(cx-bbw/2,bby,bbw,bbh);
  X.strokeStyle='#d33'; X.lineWidth=2;
  const sw=rw*0.8, sh=rw*0.55;
  X.strokeRect(cx-sw/2,ry-sh*0.2,sw,sh);

  // Rim
  const rimY=ry+rw*0.45;
  X.strokeStyle='#e85d04'; X.lineWidth=3.5;
  X.beginPath(); X.ellipse(cx,rimY,rw/2,rw*0.13,0,0,Math.PI*2); X.stroke();
  X.fillStyle='rgba(232,93,4,0.1)'; X.fill();

  // Net
  const nb=rimY+rw*0.65;
  const t=performance.now()/700;
  X.strokeStyle='rgba(255,255,255,0.3)'; X.lineWidth=1;
  for (let i=0;i<=7;i++) {
    const a=i/7*Math.PI*2;
    const rx=cx+Math.cos(a)*rw*0.42, ry2=rimY+Math.sin(a)*rw*0.1;
    const s=Math.sin(t+i)*2.5;
    X.beginPath(); X.moveTo(rx,ry2); X.quadraticCurveTo(rx+s,(ry2+nb)/2,cx+s*0.4,nb); X.stroke();
  }
  for (let j=1;j<=3;j++) {
    const f=j/4, ny=rimY+(nb-rimY)*f;
    X.beginPath(); X.ellipse(cx,ny,rw*0.42*(1-f*0.55),rw*0.1*(1-f*0.4),0,0,Math.PI*2); X.stroke();
  }
}

function drawHands() {
  if (state!=='shooting'||ball.active) return;
  const hy=H*0.87, sp=28;
  const bg=X.createRadialGradient(W/2-2,hy-2,2,W/2,hy,15);
  bg.addColorStop(0,'#f8a000'); bg.addColorStop(0.6,'#e85d04'); bg.addColorStop(1,'#b84400');
  X.fillStyle=bg; X.beginPath(); X.arc(W/2,hy,15,0,Math.PI*2); X.fill();
  X.strokeStyle='rgba(0,0,0,0.15)'; X.lineWidth=1;
  X.beginPath(); X.moveTo(W/2-15,hy); X.lineTo(W/2+15,hy); X.stroke();
  X.fillStyle='#c4813a';
  X.beginPath(); X.ellipse(W/2-sp,hy+3,13,9,-0.2,0,Math.PI*2); X.fill();
  X.beginPath(); X.ellipse(W/2+sp,hy+3,13,9,0.2,0,Math.PI*2); X.fill();
}

function drawBall() {
  if (!ball.active) return;
  const prog=ball.t/ball.dur;
  const sc=1-prog*0.55, r=14*sc;
  const arc=-190*Math.sin(prog*Math.PI);
  const bx=ball.x+(ball.tx-ball.x)*prog;
  const by=ball.y+(ball.ty-ball.y)*prog+arc;

  X.fillStyle='rgba(0,0,0,0.12)';
  X.beginPath(); X.ellipse(bx,CT()+(CB()-CT())*0.3,r*0.7,r*0.15,0,0,Math.PI*2); X.fill();

  const bg=X.createRadialGradient(bx-r*0.3,by-r*0.3,r*0.1,bx,by,r);
  bg.addColorStop(0,'#f8a000'); bg.addColorStop(0.6,'#e85d04'); bg.addColorStop(1,'#b84400');
  X.fillStyle=bg; X.beginPath(); X.arc(bx,by,r,0,Math.PI*2); X.fill();
  X.strokeStyle='rgba(0,0,0,0.15)'; X.lineWidth=1;
  X.beginPath(); X.moveTo(bx-r,by); X.lineTo(bx+r,by); X.stroke();
}

function drawFlingGuide() {
  if (!fling.down||state!=='shooting') return;
  X.strokeStyle='rgba(255,255,255,0.4)'; X.lineWidth=2; X.setLineDash([6,4]);
  X.beginPath(); X.moveTo(fling.sx,fling.sy); X.lineTo(fling.cx,fling.cy); X.stroke();
  X.setLineDash([]);
  const dx=fling.sx-fling.cx, dy=fling.sy-fling.cy, len=Math.sqrt(dx*dx+dy*dy);
  if (len>15) {
    const nx=dx/len, ny=dy/len;
    const tx=W/2+nx*50, ty=H*0.85+ny*50;
    X.fillStyle='rgba(255,255,255,0.5)';
    X.beginPath();
    X.moveTo(tx,ty); X.lineTo(tx-ny*7-nx*7,ty+nx*7-ny*7); X.lineTo(tx+ny*7-nx*7,ty-nx*7-ny*7);
    X.closePath(); X.fill();
  }
}

function drawParticles() {
  for (let i=parts.length-1;i>=0;i--) {
    const p=parts[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.life-=0.02;
    if (p.life<=0){parts.splice(i,1);continue;}
    X.globalAlpha=p.life; X.fillStyle=p.c;
    X.beginPath(); X.arc(p.x,p.y,p.s,0,Math.PI*2); X.fill();
  }
  X.globalAlpha=1;
}
function burst(x,y,c,n) {
  for(let i=0;i<n;i++) parts.push({x,y,vx:(Math.random()-0.5)*7,vy:(Math.random()-0.5)*5-2,s:Math.random()*4+1.5,c,life:1});
}

function drawRunHome() {
  const prog=Math.min(runT/180,1), sc=1-prog*0.85;
  const fx=W/2+Math.sin(runT*0.15)*8*sc;
  const fy=CB()-20-prog*(CB()-20-HZ()-20);
  const ps=sc*18, ls=Math.sin(runT*0.3)*0.5;
  X.save(); X.translate(fx,fy);
  X.fillStyle='rgba(0,0,0,0.18)'; X.beginPath(); X.ellipse(0,ps*0.5,ps*0.7,ps*0.15,0,0,Math.PI*2); X.fill();
  X.strokeStyle='#222'; X.lineWidth=Math.max(2,ps*0.18); X.lineCap='round';
  X.beginPath(); X.moveTo(-ps*0.15,-ps*0.2); X.lineTo(-ps*0.2+Math.sin(ls)*ps*0.35,ps*0.1); X.stroke();
  X.beginPath(); X.moveTo(ps*0.15,-ps*0.2); X.lineTo(ps*0.2-Math.sin(ls)*ps*0.35,ps*0.1); X.stroke();
  X.fillStyle='#e85d04'; X.beginPath(); X.ellipse(0,-ps*0.6,ps*0.4,ps*0.5,0,0,Math.PI*2); X.fill();
  X.fillStyle='#c4813a'; X.beginPath(); X.arc(0,-ps*1.3,ps*0.35,0,Math.PI*2); X.fill();
  X.restore();
  // House
  const hsc=0.35+prog*0.5, hw=38*hsc, hh=28*hsc, hy=HZ()+8;
  X.fillStyle='#d4a574'; X.fillRect(W/2-hw/2,hy-hh,hw,hh);
  X.fillStyle='#8b4513'; X.beginPath();
  X.moveTo(W/2-hw/2-4,hy-hh); X.lineTo(W/2,hy-hh-18*hsc); X.lineTo(W/2+hw/2+4,hy-hh);
  X.closePath(); X.fill();
  X.fillStyle='#5a3018'; X.fillRect(W/2-4*hsc,hy-13*hsc,8*hsc,13*hsc);
  X.fillStyle='#87ceeb';
  X.fillRect(W/2-hw/2+3,hy-hh+4,7*hsc,7*hsc);
  X.fillRect(W/2+hw/2-3-7*hsc,hy-hh+4,7*hsc,7*hsc);
}

// ======== GAME LOGIC ========
function updateHUD() {
  document.getElementById('hud-court').textContent=`${court+1}/${COURTS}`;
  document.getElementById('hud-shots').textContent=`${made}/${NEEDED}`;
  document.getElementById('hud-total').textContent=totalMade;
}

function shoot(dx, dy) {
  const len=Math.sqrt(dx*dx+dy*dy);
  if (len<20) return;

  ball.x=W/2; ball.y=H*0.85;
  const offsetX = -dx*0.4;
  ball.tx = RCX() + offsetX;
  ball.ty = RCY() + RW()*0.45;
  ball.t=0; ball.dur=35; ball.active=true;

  const miss=Math.abs(ball.tx-RCX()), rw=RW();
  let scored;
  if (miss < rw*0.5) scored=true;
  else if (miss < rw*0.9) scored=Math.random()<0.4;
  else scored=false;
  if (dy > -30) scored=false;
  ball.scored=scored;
  state='flight';
}

function onShotLand() {
  ball.active=false;
  if (ball.scored) {
    made++; totalMade++;
    say(phrases[Math.floor(Math.random()*phrases.length)]);
    burst(ball.tx,ball.ty,'#f8a000',22);
    burst(ball.tx,ball.ty,'#fff',12);
  } else {
    if (made>0) {
      calloutEl.textContent='Miss! Starting over...';
      calloutEl.style.opacity='1';
      setTimeout(()=>{calloutEl.style.opacity='0';},1300);
    }
    made=0;
    burst(ball.tx+(Math.random()-0.5)*20,ball.ty,'#888',6);
  }
  updateHUD();
  if (made>=NEEDED) {
    setTimeout(()=>{ if(court<COURTS-1) showCourtDone(); else startRunHome(); },900);
  } else {
    setTimeout(()=>{state='shooting';},500);
  }
}

function showCourtDone() {
  state='courtDone';
  popup.innerHTML=`<div class="pop-title">${courtNames[court]} Done!</div><div class="pop-sub">30 shots made!</div><div class="pop-stats">Total: ${totalMade} across ${court+1} court${court>0?'s':''}</div><button class="pop-btn" id="btn-next">Next Court</button>`;
  popup.style.display='block'; hintEl.textContent='';
  document.getElementById('btn-next').onclick=nextCourt;
}
function nextCourt() {
  popup.style.display='none'; court++; made=0;
  trans.alpha=0; trans.dir=1;
  trans.cb=()=>{state='shooting'; hintEl.textContent='Swipe up to shoot!'; updateHUD();};
  state='transition';
}
function startRunHome() { state='runHome'; runT=0; say('Heading home!'); hintEl.textContent=''; }
function showFinal() {
  state='done';
  popup.innerHTML=`<div class="pop-title">You Made It Home!</div><div class="pop-sub" style="font-size:56px;margin:6px 0">&#127942;</div><div class="pop-sub">${totalMade} total shots across ${COURTS} courts</div><button class="pop-btn" id="btn-again">Play Again</button>`;
  popup.style.display='block';
  say('You made it home! '+totalMade+' total shots!');
  document.getElementById('btn-again').onclick=resetGame;
}
function resetGame() { popup.style.display='none'; court=0;made=0;totalMade=0; state='shooting'; updateHUD(); hintEl.textContent='Swipe up to shoot!'; }
function showTitle() {
  state='title';
  popup.innerHTML=`<div class="pop-title">&#127936; Hoops Run</div><div class="pop-sub">Make 30 shots at each court, then run to the next!</div><div class="pop-stats">Swipe up to fling the ball at the hoop.<br>Miss and your count resets!</div><button class="pop-btn" id="btn-start">Let's Go!</button>`;
  popup.style.display='block';
  document.getElementById('btn-start').onclick=startGame;
}
function startGame() { popup.style.display='none'; court=0;made=0;totalMade=0; state='shooting'; updateHUD(); hintEl.textContent='Swipe up to shoot!'; }

// ======== INPUT ========
function pDown(x,y){if(state!=='shooting'||ball.active)return;fling.down=true;fling.sx=x;fling.sy=y;fling.cx=x;fling.cy=y;}
function pMove(x,y){if(fling.down){fling.cx=x;fling.cy=y;}}
function pUp(x,y){if(!fling.down)return;fling.down=false;shoot(fling.sx-x,fling.sy-y);}
C.addEventListener('mousedown',e=>pDown(e.clientX,e.clientY));
C.addEventListener('mousemove',e=>pMove(e.clientX,e.clientY));
C.addEventListener('mouseup',e=>pUp(e.clientX,e.clientY));
C.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];pDown(t.clientX,t.clientY);});
C.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0];pMove(t.clientX,t.clientY);});
C.addEventListener('touchend',e=>{e.preventDefault();const t=e.changedTouches[0];pUp(t.clientX,t.clientY);});

// ======== LOOP ========
function update() {
  if (state==='flight'&&ball.active) { ball.t++; if(ball.t>=ball.dur) onShotLand(); }
  if (state==='transition') {
    trans.alpha+=trans.dir*0.04;
    if(trans.alpha>=1){trans.dir=-1;if(trans.cb){trans.cb();trans.cb=null;}}
    if(trans.alpha<=0&&trans.dir===-1) trans.alpha=0;
  }
  if (state==='runHome') { runT++; if(runT>180) showFinal(); }
}
function draw() {
  X.clearRect(0,0,W,H);
  drawSky(); drawGround(); drawCourt(); drawHoop();
  if(state==='runHome') drawRunHome();
  drawBall(); drawFlingGuide(); drawHands(); drawParticles();
  if(state==='transition'){X.fillStyle=`rgba(0,0,0,${Math.max(0,trans.alpha)})`;X.fillRect(0,0,W,H);}
}
function loop(){update();draw();requestAnimationFrame(loop);}
showTitle();
requestAnimationFrame(loop);
</script>
