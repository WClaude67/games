<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Trash Adventure</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #16161e; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; font-family: 'Consolas', monospace; }
canvas { display: block; image-rendering: pixelated; border: 2px solid #50d278; }
#ui { position: absolute; top: 0; left: 0; width: 100%; pointer-events: none; }
#mobile-controls { display: none; position: fixed; bottom: 10px; left: 0; width: 100%; pointer-events: all; z-index: 10; }
.dpad { position: absolute; bottom: 20px; left: 20px; width: 140px; height: 140px; }
.dpad button { position: absolute; width: 44px; height: 44px; background: rgba(80,210,120,0.3); border: 2px solid #50d278; border-radius: 8px; color: #50d278; font-size: 20px; }
.dpad .up { top: 0; left: 48px; }
.dpad .down { bottom: 0; left: 48px; }
.dpad .left { top: 48px; left: 0; }
.dpad .right { top: 48px; right: 0; }
.action-btn { position: absolute; bottom: 40px; right: 30px; width: 60px; height: 60px; background: rgba(80,210,120,0.3); border: 2px solid #50d278; border-radius: 50%; color: #50d278; font-size: 14px; font-weight: bold; }
@media (max-width: 768px) { #mobile-controls { display: block; } }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="mobile-controls">
  <div class="dpad">
    <button class="up" data-dir="up">&#9650;</button>
    <button class="down" data-dir="down">&#9660;</button>
    <button class="left" data-dir="left">&#9664;</button>
    <button class="right" data-dir="right">&#9654;</button>
  </div>
  <button class="action-btn" id="actionBtn">ACT</button>
</div>
<script src="game.js"></script>
</body>
</html>
