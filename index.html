<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #16161e; color: #dddde6; font-family: 'Consolas', 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .container { text-align: center; padding: 40px; }
  h1 { font-size: 28px; margin-bottom: 32px; color: #50d278; }
  .game-link {
    display: inline-block; padding: 16px 32px; margin: 8px;
    border: 2px solid #50d278; border-radius: 8px; color: #50d278;
    text-decoration: none; font-size: 18px; transition: all 0.2s;
  }
  .game-link:hover { background: #50d278; color: #16161e; }
</style>
</head>
<body>
<div class="container">
  <h1>Games</h1>
  <a href="trash-puzzle/" class="game-link">Trash Puzzle</a>
  <a href="trash-adventure/" class="game-link">Trash Adventure</a>
</div>
</body>
</html>
